<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Stay at the luxurious Hotel Name at Storgatan 1 for first class service and comfortable rooms. Book your stay now!">
    <title>Hotel Name - contact</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <img height="256" width="256" src="img/hotel-logo.webp" alt="hotel logo" loading="lazy">
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="book.html">Book</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="contact.html">Contact us</a></li>
        </ul>
    </nav>

    <main class="container">

        <section class="item">
            <h2>Send us a message</h2>

            <form action="#" method="post">

                <label for="f-name">*First name:</label>
                <input type="text" id="f-name" name="f-name" minlength="2" maxlength="60" required>

                <label for="l-name">*Last name:</label>
                <input type="text" id="l-name" name="l-name" minlength="2" maxlength="60" required>

                <label for="email">*Email:</label>
                <input type="email" id="email" name="email" minlength="1" maxlength="60" required>

                <label for="phone">*Phone:</label>
                <input type="tel" id="phone" name="phone" minlength="10" maxlength="10" required>

                <label for="message">*Message:</label>
                <textarea id="message" name="message" rows="12" cols="40" required></textarea>

                <button type="submit">Send</button>
            </form>

        </section>

        <section class="item">

            <h2>Other ways to contact us</h2>
            <p>
                Email: hotelname@mail.com<br>
                Phone: 012 - 12 34 56<br>
                Phone times: Mo-Fr 08:00 - 17:00, Sa-Su 11:00 - 15:00
            </p>

            <h2>Find us here</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d18034.607132794426!2d12.96319117431641!3d55.596341699999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4653a150b1d6aa3d%3A0xe2d54b3660e28152!2sScandic%20Triangeln!5e0!3m2!1ssv!2sse!4v1758375137736!5m2!1ssv!2sse"
                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                title="map location of hotel"></iframe>
        </section>

    </main>

    <footer>
        <p>Hotel Name | Storgatan 1 | 123 45 Storstad | 012 - 12 34 56</p>
    </footer>

</body>

</html>
