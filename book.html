<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Stay at the luxurious Hotel Name at Storgatan 1 for first class service and comfortable rooms. Book your stay now!">
    <title>Hotel Name - book</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <img height="256" width="256" src="img/hotel-logo.webp" alt="hotel logo" loading="lazy">
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="book.html">Book</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="contact.html">Contact us</a></li>
        </ul>
    </nav>

    <main class="container">

        <section class="item">
            <h2>Book a room</h2>

            <form action="#" method="post">

                <label for="f-name">*First name:</label>
                <input type="text" id="f-name" name="f-name" minlength="2" maxlength="60" required>

                <label for="l-name">*Last name:</label>
                <input type="text" id="l-name" name="l-name" minlength="2" maxlength="60" required>

                <label for="email">*Email:</label>
                <input type="email" id="email" name="email" minlength="1" maxlength="60" required>

                <label for="phone">*Phone:</label>
                <input type="tel" id="phone" name="phone" minlength="10" maxlength="10" required>

                <label for="a-date">*Arrival date:</label>
                <input type="date" id="a-date" name="a-date" required>

                <label for="d-date">*Departure date:</label>
                <input type="date" id="d-date" name="d-date" required>

                <label for="guests">*Number of guests:</label>
                <input type="number" id="guests" name="guests" required>

                <button type="submit">Book</button>
            </form>

        </section>

        <div class="item">
            <img class="room-preview" width="800" height="450" src="img/hotel-room.webp" alt="hotel-room"
                loading="lazy">
        </div>

    </main>

    <footer>
        <p>Hotel Name | Storgatan 1 | 123 45 Storstad | 012 - 12 34 56</p>
    </footer>

</body>

</html>
